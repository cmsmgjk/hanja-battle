<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ 한자배틀</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a18;
  --surface: #12122a;
  --card: #1a1a32;
  --border: #282848;
  --gold: #ffd700;
  --gold2: #ffaa00;
  --red: #ff4455;
  --green: #00e676;
  --blue: #4488ff;
  --purple: #aa44ff;
  --white: #f0f0ff;
  --muted: #6666aa;
  --hp-green: #00c851;
  --hp-yellow: #ffbb33;
  --hp-red: #ff4444;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--white);
  font-family: 'Noto Serif KR', serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── 화면 전환 ── */
.screen { display:none; position:relative; z-index:1; min-height:100vh; }
.screen.active { display:flex; flex-direction:column; align-items:center; }

/* ════════════════════════════════════
   공통 버튼
════════════════════════════════════ */
.btn-gold {
  padding: 16px 40px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none; border-radius: 14px;
  color: #1a1100;
  font-family: 'Black Han Sans', sans-serif;
  font-size: 18px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-gold:hover { transform: scale(1.04); box-shadow: 0 4px 20px rgba(255,215,0,0.4); }

.btn-ghost {
  padding: 10px 24px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--muted);
  font-family: 'Noto Serif KR', serif;
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--white); color: var(--white); }

/* ════════════════════════════════════
   메인 화면
════════════════════════════════════ */
#main-screen {
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  gap: 28px;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(68,136,255,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(170,68,255,0.07) 0%, transparent 50%),
    var(--bg);
}

.main-logo {
  font-family: 'Black Han Sans', sans-serif;
  font-size: clamp(52px, 12vw, 100px);
  background: linear-gradient(135deg, var(--gold), var(--gold2), #ff8800);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1;
  animation: titleFloat 3s ease-in-out infinite;
}
@keyframes titleFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.main-subtitle {
  color: var(--muted); font-size: 15px; letter-spacing: 4px;
  text-transform: uppercase; margin-top: -16px;
}

.level-select-wrap { width:100%; max-width:380px; }
.level-label { font-size:12px; color:var(--muted); margin-bottom:8px; letter-spacing:2px; }
.level-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
.level-btn {
  padding:10px 4px; border:1px solid var(--border); border-radius:10px;
  background:var(--card); color:var(--muted);
  font-family:'Black Han Sans',sans-serif; font-size:14px;
  cursor:pointer; transition:all 0.15s; text-align:center;
}
.level-btn.active { border-color:var(--gold); color:var(--gold); background:rgba(255,215,0,0.08); }
.level-btn:hover  { border-color:var(--gold2); color:var(--gold2); }

.mode-buttons { display:flex; flex-direction:column; gap:14px; width:100%; max-width:380px; }
.btn-mode {
  padding:18px 24px; border:2px solid var(--border); border-radius:16px;
  background:var(--card); color:var(--white);
  font-family:'Black Han Sans',sans-serif; font-size:20px;
  cursor:pointer; transition:all 0.2s;
  display:flex; align-items:center; gap:14px; text-align:left;
  position:relative; overflow:hidden;
}
.btn-mode::before { content:''; position:absolute; inset:0; opacity:0; transition:opacity 0.2s; }
.btn-mode-1::before { background:linear-gradient(135deg,rgba(68,136,255,0.15),transparent); }
.btn-mode-2::before { background:linear-gradient(135deg,rgba(255,68,85,0.15),transparent); }
.btn-mode:hover { transform:translateY(-2px); border-color:var(--gold); }
.btn-mode:hover::before { opacity:1; }
.mode-icon { font-size:34px; }
.mode-title { font-size:18px; color:var(--gold); display:block; }
.mode-desc  { font-size:12px; color:var(--muted); font-family:'Noto Serif KR',serif; font-weight:400; margin-top:2px; display:block; }

/* ════════════════════════════════════
   파트너 선택 화면
════════════════════════════════════ */
#starter-screen {
  justify-content: flex-start;
  padding: 30px 20px 40px;
  gap: 22px;
  background: var(--bg);
  overflow-y: auto;
}

.starter-header { text-align:center; }
.starter-title {
  font-family:'Black Han Sans',sans-serif; font-size:26px; color:var(--gold);
}
.starter-subtitle { font-size:13px; color:var(--muted); margin-top:6px; letter-spacing:1px; }

.section-label {
  font-size:12px; color:var(--muted); letter-spacing:2px;
  width:100%; max-width:520px; padding:0 2px; margin-bottom:10px;
}

.poke-cards {
  display:flex; gap:12px; justify-content:center; flex-wrap:wrap;
  width:100%; max-width:520px;
}

.poke-card {
  background:var(--card); border:2px solid var(--border);
  border-radius:16px; padding:12px 10px;
  width:140px; cursor:pointer;
  transition:all 0.2s; position:relative; text-align:center;
}
.poke-card:hover { border-color:var(--gold); transform:translateY(-4px); box-shadow:0 8px 24px rgba(255,215,0,0.2); }
.poke-card.in-party { border-color:var(--green); background:rgba(0,230,118,0.06); }
.poke-card.in-party:hover { border-color:#00ff88; box-shadow:0 8px 24px rgba(0,230,118,0.2); }
.poke-card.active-pokemon { border-color:var(--gold); background:rgba(255,215,0,0.1); }
.poke-card img { width:110px; height:110px; object-fit:contain; image-rendering:pixelated; }
.poke-card-name { font-family:'Black Han Sans',sans-serif; font-size:14px; color:var(--white); margin-top:6px; }
.poke-card-level { font-size:11px; color:var(--muted); margin-top:2px; }
.poke-badge {
  position:absolute; top:8px; right:8px;
  font-size:10px; font-family:'Black Han Sans',sans-serif;
  padding:2px 7px; border-radius:20px;
}
.poke-badge.rare  { background:linear-gradient(135deg,var(--purple),#cc88ff); color:#fff; }
.poke-badge.rare1 { background:linear-gradient(135deg,#ff8800,#ffcc00); color:#1a0a00; }
.poke-badge.rare2 { background:linear-gradient(135deg,#00ccff,#aa44ff); color:#fff; }
.poke-badge.mine  { background:rgba(0,230,118,0.2); color:var(--green); border:1px solid var(--green); }
.poke-badge.out   { background:rgba(255,215,0,0.2); color:var(--gold); border:1px solid var(--gold); }
.poke-badge.collected-badge { background:rgba(0,230,118,0.15); color:var(--green); border:1px solid rgba(0,230,118,0.4); }

.poke-card.rare1-card { border-color:#ff8800; background:rgba(255,136,0,0.07); }
.poke-card.rare1-card:hover { border-color:#ffcc00; box-shadow:0 8px 24px rgba(255,136,0,0.3); }
.poke-card.rare2-card { border-color:#00ccff; background:rgba(0,204,255,0.07); }
.poke-card.rare2-card:hover { border-color:#aa44ff; box-shadow:0 8px 24px rgba(0,204,255,0.3); }

/* ════════════════════════════════════
   배틀 화면
════════════════════════════════════ */
#battle-screen {
  justify-content: flex-start;
  background: var(--bg);
}

.battle-header {
  width:100%; padding:12px 16px;
  display:flex; align-items:center; justify-content:space-between;
  border-bottom:1px solid var(--border); background:var(--surface);
  flex-shrink:0;
}
.back-btn {
  background:none; border:1px solid var(--border); color:var(--muted);
  padding:7px 12px; border-radius:8px; cursor:pointer; font-size:12px;
  transition:all 0.15s;
}
.back-btn:hover { color:var(--white); border-color:var(--white); }
.level-badge {
  background:rgba(255,215,0,0.12); border:1px solid rgba(255,215,0,0.3);
  color:var(--gold); padding:5px 12px; border-radius:8px;
  font-family:'Black Han Sans',sans-serif; font-size:13px;
}
.progress-dots { display:flex; gap:4px; }
.dot { width:9px; height:9px; border-radius:50%; background:var(--border); transition:all 0.3s; }
.dot.hit { background:var(--gold); box-shadow:0 0 5px var(--gold); }

/* ── 3D 배틀 필드 ── */
.battle-field {
  width:100%; max-width:540px;
  margin:0 auto;
  position:relative;
  height:280px;
  flex-shrink:0;

  /* 원근감 */
  perspective: 600px;
  overflow:hidden;

  /* 배경: 위=어두운 하늘, 아래=바닥 */
  background:
    linear-gradient(180deg,
      #08081a 0%,
      #0d0d2a 40%,
      #12182e 55%,
      #1a2240 65%,
      #1e2a38 75%,
      #162030 100%
    );
}

/* 바닥 그리드 (원근감) */
.battle-field::before {
  content:'';
  position:absolute;
  bottom:0; left:-20%; right:-20%;
  height:45%;
  background:
    linear-gradient(90deg, rgba(68,136,255,0.08) 1px, transparent 1px),
    linear-gradient(0deg,  rgba(68,136,255,0.08) 1px, transparent 1px);
  background-size: 40px 40px;
  transform: rotateX(60deg);
  transform-origin: bottom center;
}

/* 바닥 광택 */
.battle-field::after {
  content:'';
  position:absolute;
  bottom:0; left:0; right:0; height:45%;
  background: linear-gradient(180deg,
    transparent 0%,
    rgba(68,136,255,0.03) 60%,
    rgba(68,136,255,0.08) 100%
  );
}

/* 상대 몬스터 (뒤쪽 = 크게) */
.enemy-wrap {
  position:absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-20%);
  display:flex; flex-direction:column; align-items:center;
  z-index:3;
}

.enemy-img {
  width: 200px; height: 200px;
  object-fit:contain; image-rendering:pixelated;
  filter: drop-shadow(0 0 20px rgba(255,68,85,0.5));
  transition: transform 0.1s;
  animation: enemyFloat 3s ease-in-out infinite;
}
@keyframes enemyFloat {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}
.enemy-img.shake {
  animation: monsterShake 0.4s ease;
}
.enemy-img.hit-anim {
  animation: monsterHit 0.35s ease;
}
@keyframes monsterShake {
  0%,100% { transform:translateX(0); }
  20% { transform:translateX(10px); }
  40% { transform:translateX(-10px); }
  60% { transform:translateX(7px); }
  80% { transform:translateX(-5px); }
}
@keyframes monsterHit {
  0%   { filter:drop-shadow(0 0 30px rgba(255,68,85,1)) brightness(3); transform:scale(1.1); }
  50%  { filter:drop-shadow(0 0 20px rgba(255,68,85,0.6)) brightness(1.5); transform:scale(0.95); }
  100% { filter:drop-shadow(0 0 20px rgba(255,68,85,0.5)); transform:scale(1); }
}

.enemy-name-tag {
  background: rgba(255,68,85,0.15);
  border: 1px solid rgba(255,68,85,0.4);
  border-radius:8px; padding:3px 12px;
  font-family:'Black Han Sans',sans-serif;
  font-size:13px; color:#ff8899;
  margin-top:2px; white-space:nowrap;
}

/* 내 포켓몬 (앞쪽 = 작게, 뒤돌아봄 느낌) */
.my-wrap {
  position:absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-130%);
  display:flex; flex-direction:column; align-items:center;
  z-index:4;
}

.my-img {
  width: 110px; height: 110px;
  object-fit:contain; image-rendering:pixelated;
  /* 뒤돌아보는 느낌: 좌우 반전 + 살짝 밝게 */
  filter: drop-shadow(0 4px 12px rgba(0,0,0,0.6)) brightness(1.1);
  /* 3D 원근감: 앞에 있는 것처럼 약간 기울임 */
  transform: scaleX(-1) perspective(300px) rotateY(10deg);
  animation: myFloat 2.5s ease-in-out infinite;
}
@keyframes myFloat {
  0%,100% { transform: scaleX(-1) perspective(300px) rotateY(10deg) translateY(0); }
  50%      { transform: scaleX(-1) perspective(300px) rotateY(10deg) translateY(-5px); }
}
.my-img.attack-anim {
  animation: myAttack 0.4s ease;
}
@keyframes myAttack {
  0%   { transform: scaleX(-1) perspective(300px) rotateY(10deg) translateX(0); }
  40%  { transform: scaleX(-1) perspective(300px) rotateY(10deg) translateX(60px) scale(1.05); }
  100% { transform: scaleX(-1) perspective(300px) rotateY(10deg) translateX(0); }
}

.my-name-tag {
  background: rgba(0,230,118,0.12);
  border: 1px solid rgba(0,230,118,0.35);
  border-radius:8px; padding:3px 10px;
  font-family:'Black Han Sans',sans-serif;
  font-size:12px; color:#00e676;
  margin-top:2px; white-space:nowrap;
}

/* 그림자 (원근감 강조) */
.enemy-shadow {
  position:absolute;
  bottom: 28%;
  left: calc(50% - 20% - 60px);
  width:120px; height:20px;
  background: radial-gradient(ellipse, rgba(255,68,85,0.3) 0%, transparent 70%);
  border-radius:50%;
  animation: shadowScale 3s ease-in-out infinite;
}
@keyframes shadowScale {
  0%,100% { transform:scale(1); opacity:0.6; }
  50%      { transform:scale(0.85); opacity:0.3; }
}

.my-shadow {
  position:absolute;
  bottom: 4%;
  left: calc(50% - 130% - 30px);
  width:70px; height:12px;
  background: radial-gradient(ellipse, rgba(68,255,136,0.25) 0%, transparent 70%);
  border-radius:50%;
  animation: myShadowScale 2.5s ease-in-out infinite;
}
@keyframes myShadowScale {
  0%,100% { transform:scale(1); opacity:0.5; }
  50%      { transform:scale(0.85); opacity:0.25; }
}

/* ── 배틀 정보 패널 ── */
.battle-info {
  width:100%; max-width:540px; margin:0 auto;
  padding:10px 16px;
  display:flex; justify-content:space-between; align-items:stretch;
  gap:10px; flex-shrink:0;
}

/* 몬스터 HP */
.enemy-hp-panel {
  flex:1; background:var(--surface);
  border:1px solid rgba(255,68,85,0.25);
  border-radius:12px; padding:8px 12px;
}
.hp-panel-name { font-size:11px; color:#ff8899; letter-spacing:1px; margin-bottom:4px; }
.hp-bar-wrap { display:flex; align-items:center; gap:6px; }
.hp-bar { flex:1; height:10px; background:var(--border); border-radius:5px; overflow:hidden; }
.hp-fill { height:100%; border-radius:5px; background:var(--hp-green); transition:width 0.4s ease, background 0.3s; }
.hp-fill.yellow { background:var(--hp-yellow); }
.hp-fill.red    { background:var(--hp-red); }
.hp-text { font-size:11px; color:var(--muted); width:36px; text-align:right; flex-shrink:0; }

/* 내 HP + 스킬 */
.my-hp-panel {
  flex:1; background:var(--surface);
  border:1px solid rgba(0,230,118,0.2);
  border-radius:12px; padding:8px 12px;
  display:flex; flex-direction:column; gap:6px;
}
.hp-panel-name.mine { color:var(--green); }
.player-hearts { display:flex; gap:4px; }
.heart { font-size:18px; transition:all 0.3s; }
.heart.empty { filter:grayscale(1) opacity(0.3); }

.skill-btn {
  background: var(--card); border:1px solid var(--border);
  border-radius:8px; padding:5px 8px;
  display:flex; align-items:center; gap:6px;
  cursor:pointer; transition:all 0.2s;
  font-size:12px; color:var(--muted);
  position:relative; overflow:hidden;
}

/* 충전 중: 파이프 색에 따라 점점 주황빛 */
.skill-btn.charging {
  border-color: rgba(255,100,0,0.4);
  color: #ffaa44;
}

/* 스킬 준비됨: 불타는 이펙트 */
.skill-btn.ready {
  border-color: #ff6600;
  color: #fff;
  background: linear-gradient(135deg, #1a0800, #2a1000);
  animation: fireBorder 0.6s ease-in-out infinite alternate;
}

@keyframes fireBorder {
  0%   { border-color:#ff4400; box-shadow: 0 0 8px #ff4400, 0 0 20px rgba(255,68,0,0.5), inset 0 0 12px rgba(255,100,0,0.15); }
  50%  { border-color:#ff8800; box-shadow: 0 0 14px #ff8800, 0 0 32px rgba(255,136,0,0.6), inset 0 0 18px rgba(255,150,0,0.2); }
  100% { border-color:#ffcc00; box-shadow: 0 0 10px #ffcc00, 0 0 24px rgba(255,200,0,0.5), inset 0 0 14px rgba(255,200,0,0.15); }
}

/* 불꽃 파티클 레이어 */
.skill-btn.ready::before {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(180deg,
    rgba(255,80,0,0.0) 0%,
    rgba(255,120,0,0.12) 40%,
    rgba(255,60,0,0.18) 70%,
    rgba(255,30,0,0.08) 100%
  );
  animation: fireFlicker 0.3s ease-in-out infinite alternate;
  pointer-events:none;
  border-radius:8px;
}

@keyframes fireFlicker {
  0%   { opacity:0.6; transform:scaleY(1); }
  100% { opacity:1;   transform:scaleY(1.04); }
}

/* 불꽃 글자 */
.skill-btn.ready .skill-fire-text {
  background: linear-gradient(180deg, #ffee00 0%, #ff6600 60%, #ff2200 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-family:'Black Han Sans',sans-serif;
  font-size:13px;
  animation: fireTextFlicker 0.4s ease-in-out infinite alternate;
  filter: drop-shadow(0 0 4px rgba(255,100,0,0.8));
}
@keyframes fireTextFlicker {
  0%   { filter:drop-shadow(0 0 3px rgba(255,80,0,0.8)); }
  100% { filter:drop-shadow(0 0 8px rgba(255,180,0,1)); }
}

.skill-pips { display:flex; gap:3px; }
.skill-pip {
  width:7px; height:7px; border-radius:50%;
  background:var(--border); transition:background 0.3s, box-shadow 0.3s;
}
.skill-pip.filled {
  background: linear-gradient(135deg, #ff8800, #ffcc00);
  box-shadow: 0 0 4px rgba(255,136,0,0.7);
}
/* 스킬 준비 시 pip들도 불타게 */
.skill-btn.ready .skill-pip.filled {
  background: linear-gradient(135deg, #ff4400, #ff8800, #ffee00);
  box-shadow: 0 0 6px rgba(255,100,0,0.9);
  animation: pipFire 0.4s ease-in-out infinite alternate;
}
@keyframes pipFire {
  0%   { box-shadow:0 0 4px rgba(255,60,0,0.8); }
  100% { box-shadow:0 0 10px rgba(255,180,0,1); }
}

/* ── 한자 & 선택지 ── */
.hanja-area {
  width:100%; max-width:540px; margin:0 auto;
  padding:8px 16px 0;
  text-align:center; flex-shrink:0;
}
.hanja-char {
  font-family:'Black Han Sans',sans-serif;
  font-size:clamp(60px,15vw,90px);
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  line-height:1; display:block;
  filter:drop-shadow(0 0 16px rgba(255,215,0,0.3));
}
.hanja-hint { font-size:12px; color:var(--muted); margin-top:2px; letter-spacing:2px; }

.choices-grid {
  width:100%; max-width:540px; margin:0 auto;
  padding:10px 16px 20px;
  display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;
}
.choice-btn {
  padding:16px 6px; border:2px solid var(--border); border-radius:12px;
  background:var(--card); color:var(--white);
  font-family:'Black Han Sans',sans-serif; font-size:14px;
  cursor:pointer; transition:all 0.15s; text-align:center; line-height:1.4;
}
.choice-btn:hover:not(:disabled) { border-color:var(--gold2); background:rgba(255,170,0,0.08); transform:translateY(-2px); }
.choice-btn.correct { border-color:var(--green); background:rgba(0,230,118,0.12); color:var(--green); animation:choiceOk 0.4s ease; }
.choice-btn.wrong   { border-color:var(--red);   background:rgba(255,68,85,0.12);  color:var(--red);   animation:choiceNg 0.3s ease; }
@keyframes choiceOk { 0%{transform:scale(1)} 50%{transform:scale(1.06)} 100%{transform:scale(1)} }
@keyframes choiceNg { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ════════════════════════════════════
   처치 후 선택 화면
════════════════════════════════════ */
#catch-screen {
  justify-content: flex-start;
  padding: 28px 20px 40px;
  gap: 20px;
  background: var(--bg);
  overflow-y: auto;
}
.catch-title { font-family:'Black Han Sans',sans-serif; font-size:28px; color:var(--gold); text-align:center; }
.catch-subtitle { font-size:13px; color:var(--muted); text-align:center; margin-top:-12px; }

.stat-row { display:flex; gap:16px; justify-content:center; }
.stat-box { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:12px 20px; text-align:center; }
.stat-num { font-family:'Black Han Sans',sans-serif; font-size:30px; color:var(--gold); display:block; }
.stat-label { font-size:11px; color:var(--muted); margin-top:2px; letter-spacing:1px; }

.collection-bar {
  width:100%; max-width:520px;
  background:var(--surface); border:1px solid var(--border);
  border-radius:12px; padding:10px 14px;
  display:flex; align-items:center; gap:10px;
}
.coll-label { font-size:11px; color:var(--muted); white-space:nowrap; letter-spacing:1px; }
.coll-imgs { display:flex; gap:4px; flex-wrap:wrap; }
.coll-thumb {
  width:34px; height:34px; object-fit:contain; image-rendering:pixelated;
  border-radius:6px; background:var(--card); border:1px solid var(--border);
  animation:thumbPop 0.3s ease;
}
@keyframes thumbPop { 0%{transform:scale(0);opacity:0} 60%{transform:scale(1.2)} 100%{transform:scale(1);opacity:1} }

/* ════════════════════════════════════
   게임 오버 화면
════════════════════════════════════ */
#gameover-screen {
  justify-content: center; align-items: center;
  padding: 40px 20px; gap: 24px;
  background: var(--bg);
}
.gameover-img {
  width:160px; height:160px; object-fit:contain; image-rendering:pixelated;
  filter:grayscale(0.4) drop-shadow(0 0 20px rgba(255,68,85,0.5));
  animation:goAppear 0.5s ease;
}
@keyframes goAppear { 0%{transform:scale(0.5);opacity:0} 60%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }
.gameover-title { font-family:'Black Han Sans',sans-serif; font-size:40px; color:var(--red); }

/* ════════════════════════════════════
   이펙트
════════════════════════════════════ */
.damage-float {
  position:fixed; font-family:'Black Han Sans',sans-serif;
  font-size:34px; pointer-events:none; z-index:999;
  animation:floatUp 0.8s ease forwards;
}
.damage-float.dmg  { color:var(--red); }
.damage-float.crit { color:var(--gold); font-size:46px; }
@keyframes floatUp {
  0%   { transform:translateY(0) scale(1); opacity:1; }
  100% { transform:translateY(-80px) scale(0.6); opacity:0; }
}

.screen-flash { position:fixed; inset:0; pointer-events:none; z-index:100; opacity:0; transition:opacity 0.1s; }
.screen-flash.red   { background:rgba(255,68,85,0.2); }
.screen-flash.green { background:rgba(0,230,118,0.15); }
.screen-flash.gold  { background:rgba(255,215,0,0.15); }
.screen-flash.show  { opacity:1; }

/* 레이저 */
.laser-container { position:fixed; inset:0; pointer-events:none; z-index:300; overflow:hidden; }
.laser-beam {
  position:absolute; height:5px;
  background:linear-gradient(90deg,transparent,#aa44ff,#fff,#aa44ff,transparent);
  border-radius:3px;
  box-shadow:0 0 10px #aa44ff, 0 0 24px rgba(170,68,255,0.6);
  animation:laserFire 0.3s ease-out forwards;
  transform-origin:left center;
}
@keyframes laserFire { 0%{width:0;opacity:1} 60%{width:100vw;opacity:1} 100%{width:100vw;opacity:0} }
.laser-impact {
  position:absolute; width:70px; height:70px; border-radius:50%;
  background:radial-gradient(circle,#fff 0%,#aa44ff 40%,transparent 70%);
  animation:impactBurst 0.4s ease-out forwards;
  transform:translate(-50%,-50%);
}
@keyframes impactBurst {
  0%  { transform:translate(-50%,-50%) scale(0.2); opacity:1; }
  50% { transform:translate(-50%,-50%) scale(1.4); opacity:0.8; }
  100%{ transform:translate(-50%,-50%) scale(2.2); opacity:0; }
}
.laser-ring {
  position:absolute; width:90px; height:90px;
  border:3px solid #aa44ff; border-radius:50%;
  animation:ringExpand 0.5s ease-out forwards;
  transform:translate(-50%,-50%);
}
@keyframes ringExpand {
  0%  { transform:translate(-50%,-50%) scale(0.3); opacity:1; }
  100%{ transform:translate(-50%,-50%) scale(2.8); opacity:0; }
}

/* 폭죽 */
.confetti-wrap { position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden; }
.cp {
  position:absolute; top:-20px;
  animation:cpFall linear forwards; border-radius:2px;
}
@keyframes cpFall {
  0%  { transform:translateY(0) rotate(0deg); opacity:1; }
  100%{ transform:translateY(110vh) rotate(720deg); opacity:0; }
}

/* 스크롤바 */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
</style>
</head>

function pokeUrl(name) {
  return `https://img.pokemondb.net/artwork/large/${name}.jpg`;
}
function pokeKr(name) { return POKEMON_KR[name] || name; }
function randPoke(level) {
  const pool = POKEMON_POOL[level] || POKEMON_POOL[8];
  return pool[Math.floor(Math.random() * pool.length)];
}

// ════════════════════════════════════════════
function shuffle(a) {
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function flash(color) {
  const el = document.getElementById('fx-'+color);
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 160);
}
function floatDmg(el, text, type) {
  const rect = el.getBoundingClientRect();
  const d = document.createElement('div');
  d.className = 'damage-float ' + type;
  d.textContent = text;
  d.style.left = (rect.left + rect.width/2 - 20) + 'px';
  d.style.top  = (rect.top  + rect.height/2) + 'px';
  document.body.appendChild(d);
  setTimeout(()=>d.remove(), 850);
}

// ════════════════════════════════════════════
function goMain() {
  renderMainPokemons();
  showScreen('main-screen');
}

function renderMainPokemons() {
  const wrap = document.getElementById('main-pokemons');
  wrap.innerHTML = '';

  // 급수에 맞는 포켓몬 3마리 랜덤 선택
  const pool = POKEMON_POOL[G.level] || POKEMON_POOL[8];
  const picks = shuffle([...pool]).slice(0, 3);
  const sizes = [90, 120, 90]; // 가운데가 크게

  picks.forEach((name, i) => {
    const img = document.createElement('img');
    img.src = pokeUrl(name);
    img.alt = pokeKr(name);
    img.title = pokeKr(name);
    img.style.cssText = `
      width:${sizes[i]}px; height:${sizes[i]}px;
      object-fit:contain; image-rendering:pixelated;
      filter:drop-shadow(0 0 12px rgba(255,215,0,${i===1?'0.5':'0.3'}));
      animation:mainPokeBounce 2s ease-in-out infinite;
      animation-delay:${i * 0.3}s;
      cursor:default;
    `;
    wrap.appendChild(img);
  });
}

  const isFirst = G.party.length === 0;

  document.getElementById('starter-subtitle').textContent = isFirst

    : '출전할 포켓몬을 선택하세요';

  // 내 파티
  const partyZone = document.getElementById('party-zone');
  const partyCards = document.getElementById('party-cards');
  if (G.party.length > 0) {
    partyZone.style.display = 'block';
    partyCards.innerHTML = '';
    G.party.forEach((name, idx) => {
      partyCards.appendChild(makePokeCard(name, G.level, false, idx === G.activeIdx, false, () => {
        G.activeIdx = idx;
        startBattle();
      }, '출전'));
    });
  } else {
    partyZone.style.display = 'none';
  }

  // 새 파트너 후보 3마리 (같은 급수에서)
  document.getElementById('new-label').textContent = isFirst ? '✨ 파트너를 선택하세요' : '✨ 새 파트너 영입';
  const newCards = document.getElementById('new-cards');
  newCards.innerHTML = '';

  const pool = (POKEMON_POOL[G.level] || []).filter(p => !G.party.includes(p));
  const fallback = POKEMON_POOL[G.level] || [];
  const src = pool.length >= 3 ? pool : fallback;
  const picks = shuffle([...src]).slice(0, 3);

  picks.forEach(name => {
    newCards.appendChild(makePokeCard(name, G.level, false, false, false, () => {
      if (!G.party.includes(name)) G.party.push(name);
      G.activeIdx = G.party.indexOf(name);
      startBattle();
    }, isFirst ? '선택!' : '영입'));
  });
}

// 다음 상대 3마리 생성
// 슬롯1: 같은 급수 (확정)
// 슬롯2: 50% → 한등급 위 / 50% → 같은 급수
// 슬롯3: 25% → 두등급 위 / 75% → 같은 급수
function generateEnemyCandidates() {
  const result = [];
  const collected = G.collected;

  function pickFrom(level) {
    const pool = (POKEMON_POOL[level] || []).filter(p => !collected.includes(p));
    const fallback = POKEMON_POOL[level] || [];
    const src = pool.length > 0 ? pool : fallback;
    return { name: src[Math.floor(Math.random() * src.length)], level };
  }

  // 슬롯1: 확정 같은 급수
  result.push({ ...pickFrom(G.level), tier: 'normal' });

  // 슬롯2: 50% 한 등급 위
  if (Math.random() < 0.5 && G.level > 1) {
    result.push({ ...pickFrom(G.level - 1), tier: 'rare1' });
  } else {
    result.push({ ...pickFrom(G.level), tier: 'normal' });
  }

  // 슬롯3: 25% 두 등급 위
  if (Math.random() < 0.25 && G.level > 2) {
    result.push({ ...pickFrom(G.level - 2), tier: 'rare2' });
  } else {
    result.push({ ...pickFrom(G.level), tier: 'normal' });
  }

  // 중복 이름 제거 (같은 포켓몬이 두 번 나오지 않게)
  const seen = new Set();
  return result.map(item => {
    if (seen.has(item.name)) {
      const pool = (POKEMON_POOL[item.level] || []).filter(p => !seen.has(p));
      const fallback = POKEMON_POOL[item.level] || [];
      const src = pool.length > 0 ? pool : fallback;
      item.name = src[Math.floor(Math.random() * src.length)];
    }
    seen.add(item.name);
    return item;
  });
}

function makePokeCard(name, level, rare, isActive, isNew, onClick, btnLabel) {
  const card = document.createElement('div');
  card.className = 'poke-card' + (isActive ? ' active-pokemon' : '') + (G.party.includes(name) && !isActive ? ' in-party' : '');

  const img = document.createElement('img');
  img.src = pokeUrl(name); img.alt = pokeKr(name);

  const nm = document.createElement('div');
  nm.className = 'poke-card-name'; nm.textContent = pokeKr(name);

  const lv = document.createElement('div');
  lv.className = 'poke-card-level'; lv.textContent = level + '급';

  card.appendChild(img); card.appendChild(nm); card.appendChild(lv);

  if (rare) {
    const b = document.createElement('div');
    b.className = 'poke-badge rare'; b.textContent = '✨ 레어';
    card.appendChild(b);
  }
  if (isActive) {
    const b = document.createElement('div');
    b.className = 'poke-badge out'; b.textContent = '출전중';
    card.appendChild(b);
  }

  card.onclick = onClick;
  return card;
}

// ════════════════════════════════════════════
// 배틀 시작
// ════════════════════════════════════════════
function startBattle() {
  // 한자 풀
  let pool = [];
  for (let lv=8; lv>=G.level; lv--) {
    if (HANJA_DB[lv]) pool = pool.concat(HANJA_DB[lv]);
  }
  const seen = new Set();
  pool = pool.filter(h=>{ if(seen.has(h.char)) return false; seen.add(h.char); return true; });
  G.pool = shuffle(pool);
  G.usedIdx = [];

  resetBattleState();
  showScreen('battle-screen');
  document.getElementById('level-badge').textContent = G.level + '급';
  loadNextHanja();
  updateAllUI();
}

function resetBattleState() {
  G.monsterHp = 10; G.playerHp = 3;
  G.skillCharge = 0; G.skillReady = false;
  G.combo = 0; G.maxCombo = 0;
  G.correctCount = 0; G.wrongCount = 0;

  // 내 포켓몬 이미지
  const myName = G.party[G.activeIdx];
  document.getElementById('my-img').src = pokeUrl(myName);
  document.getElementById('my-name').textContent = pokeKr(myName);

  // 상대 몬스터 (랜덤)
  G.enemyPoke = randPoke(G.level);
  document.getElementById('enemy-img').src = pokeUrl(G.enemyPoke);
  document.getElementById('enemy-name').textContent = '야생 ' + pokeKr(G.enemyPoke);
}

// ════════════════════════════════════════════
// 한자 문제
// ════════════════════════════════════════════
function loadNextHanja() {
  const available = G.pool.filter((_,i)=>!G.usedIdx.includes(i));
  if (available.length === 0) G.usedIdx = [];
  const avail2 = G.pool.filter((_,i)=>!G.usedIdx.includes(i));
  const idx = G.pool.indexOf(avail2[Math.floor(Math.random()*avail2.length)]);
  G.usedIdx.push(idx);
  G.currentHanja = G.pool[idx];
  document.getElementById('hanja-char').textContent = G.currentHanja.char;
  document.getElementById('hanja-hint').textContent = '훈(訓)과 음(音)을 고르세요';
  renderChoices();
}

function renderChoices() {
  const correct = G.currentHanja;
  const correctText = correct.hoon + ' ' + correct.eum;
  const others = shuffle(G.pool.filter(h=>h.char!==correct.char)).slice(0,2);
  const choices = shuffle([correctText, ...others.map(h=>h.hoon+' '+h.eum)]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = text;
    btn.onclick = () => onChoice(btn, text === correctText);
    grid.appendChild(btn);
  });
}

function onChoice(btn, isCorrect) {
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);

  if (isCorrect) {
    btn.classList.add('correct');
    G.correctCount++;
    G.combo++;
    if (G.combo > G.maxCombo) G.maxCombo = G.combo;

    G.monsterHp = Math.max(0, G.monsterHp - 1);

    // 내 포켓몬 공격 애니메이션
    const myEl = document.getElementById('my-img');
    myEl.style.animation = 'none';
    myEl.offsetHeight;
    myEl.style.animation = '';
    myEl.classList.add('attack-anim');
    setTimeout(()=>myEl.classList.remove('attack-anim'), 400);

    // 상대 피격
    const enEl = document.getElementById('enemy-img');
    enEl.classList.add('hit-anim');
    setTimeout(()=>enEl.classList.remove('hit-anim'), 350);

    floatDmg(enEl, '-1', 'dmg');
    flash('green');

    if (!G.skillReady) {
      G.skillCharge++;
      if (G.skillCharge >= G.skillMax) { G.skillCharge = G.skillMax; G.skillReady = true; }
    }

    updateAllUI();

    if (G.monsterHp <= 0) { setTimeout(showCatchScreen, 500); return; }

    setTimeout(()=>{ resetChoiceBtns(); loadNextHanja(); }, 600);

  } else {
    btn.classList.add('wrong');
    G.wrongCount++; G.combo = 0;
    G.skillCharge = Math.max(0, G.skillCharge - 1);
    G.playerHp = Math.max(0, G.playerHp - 1);

    // 상대 공격 (내 포켓몬 흔들림)
    const enEl = document.getElementById('enemy-img');
    enEl.classList.add('shake');
    setTimeout(()=>enEl.classList.remove('shake'), 400);

    flash('red');

    // 정답 하이라이트
    document.querySelectorAll('.choice-btn').forEach(b=>{
      if (b.textContent === G.currentHanja.hoon+' '+G.currentHanja.eum) b.classList.add('correct');
    });

    updateAllUI();

    if (G.playerHp <= 0) { setTimeout(showGameOver, 600); return; }
    setTimeout(()=>{ resetChoiceBtns(); loadNextHanja(); }, 1200);
  }
}

function resetChoiceBtns() {
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.disabled=false; b.classList.remove('correct','wrong');
  });
}

// ════════════════════════════════════════════
// 스킬 (레이저)
// ════════════════════════════════════════════
function useSkill() {
  if (!G.skillReady) return;
  G.skillReady = false; G.skillCharge = 0;
  updateSkillUI();
  fireLaser();
  setTimeout(()=>{
    G.monsterHp = Math.max(0, G.monsterHp - 3);
    const enEl = document.getElementById('enemy-img');
    floatDmg(enEl, '-3', 'crit');
    enEl.classList.add('hit-anim');
    setTimeout(()=>enEl.classList.remove('hit-anim'), 350);
    flash('gold');
    updateAllUI();
    if (G.monsterHp <= 0) setTimeout(showCatchScreen, 500);
  }, 280);
}

function fireLaser() {
  const wrap = document.getElementById('laser-wrap');
  const myEl = document.getElementById('my-img');
  const enEl = document.getElementById('enemy-img');
  const sr = myEl.getBoundingClientRect();
  const tr = enEl.getBoundingClientRect();
  const sx = sr.left + sr.width/2, sy = sr.top + sr.height/2;
  const tx = tr.left + tr.width/2, ty = tr.top + tr.height/2;
  const angle = Math.atan2(ty-sy, tx-sx) * 180/Math.PI;

  const beam = document.createElement('div');
  beam.className = 'laser-beam';
  beam.style.cssText = `left:${sx}px;top:${sy}px;transform:rotate(${angle}deg);`;
  wrap.appendChild(beam);

  setTimeout(()=>{
    [['laser-impact','impact'],['laser-ring','ring']].forEach(([cls])=>{
      const el = document.createElement('div');
      el.className = cls;
      el.style.cssText = `left:${tx}px;top:${ty}px;`;
      wrap.appendChild(el);
      setTimeout(()=>el.remove(), 500);
    });
    beam.remove();
  }, 220);
}

// ════════════════════════════════════════════
// UI 업데이트
// ════════════════════════════════════════════
function updateAllUI() {
  // 적 HP 바
  const pct = (G.monsterHp / G.monsterMaxHp) * 100;
  const fill = document.getElementById('enemy-hp-fill');
  fill.style.width = pct + '%';
  fill.className = 'hp-fill' + (pct>50?'': pct>20?' yellow':' red');
  document.getElementById('enemy-hp-text').textContent = G.monsterHp+'/'+G.monsterMaxHp;

  // 진행 점
  const dots = document.getElementById('progress-dots');
  dots.innerHTML = '';
  for (let i=0;i<G.monsterMaxHp;i++){
    const d=document.createElement('div');
    d.className='dot'+(i>=G.monsterHp?' hit':'');
    dots.appendChild(d);
  }

  // 내 HP
  const hearts = document.getElementById('player-hearts');
  hearts.innerHTML = '';
  for (let i=0;i<G.playerMaxHp;i++){
    const h=document.createElement('span');
    h.className='heart'+(i>=G.playerHp?' empty':'');
    h.textContent='❤️';
    hearts.appendChild(h);
  }

  updateSkillUI();
}

function updateSkillUI() {
  const btn = document.getElementById('skill-btn');
  const label = document.getElementById('skill-label');

  if (G.skillReady) {
    btn.className = 'skill-btn ready';
    label.textContent = '🔥 발동!';
  } else if (G.skillCharge > 0) {
    btn.className = 'skill-btn charging';
    label.textContent = '⚡ 스킬';
  } else {
    btn.className = 'skill-btn';
    label.textContent = '⚡ 스킬';
  }

  const pips = document.getElementById('skill-pips');
  pips.innerHTML = '';
  for (let i=0;i<G.skillMax;i++){
    const p=document.createElement('div');
    p.className='skill-pip'+(i<G.skillCharge?' filled':'');
    pips.appendChild(p);
  }
}

// ════════════════════════════════════════════
// 처치 후 화면 — 적 자동 수집 + 다음 상대 선택
// ════════════════════════════════════════════
function showCatchScreen() {
  launchConfetti();

  // 처치한 포켓몬 자동 수집
  if (!G.collected.includes(G.enemyPoke)) {
    G.collected.push(G.enemyPoke);
  }

  // 수집 메시지
  document.getElementById('catch-caught-name').textContent =
    `✅ ${pokeKr(G.enemyPoke)}을(를) 수집했습니다! (총 ${G.collected.length}마리)`;

  // 스탯
  document.getElementById('c-correct').textContent = G.correctCount;
  document.getElementById('c-wrong').textContent   = G.wrongCount;
  document.getElementById('c-combo').textContent   = G.maxCombo;

  // 수집 도감 렌더
  const collImgs = document.getElementById('coll-imgs');
  collImgs.innerHTML = '';
  G.collected.forEach(name => {
    const img = document.createElement('img');
    img.className = 'coll-thumb';
    img.src = pokeUrl(name);
    img.alt = img.title = pokeKr(name);
    collImgs.appendChild(img);
  });

  // 다음 상대 3마리 선택 카드
  const candidates = generateEnemyCandidates();
  const nextCards = document.getElementById('next-enemy-cards');
  nextCards.innerHTML = '';

  candidates.forEach(({ name, level, tier }) => {
    const card = document.createElement('div');
    const isRare1 = tier === 'rare1';
    const isRare2 = tier === 'rare2';
    card.className = 'poke-card' + (isRare2 ? ' rare2-card' : isRare1 ? ' rare1-card' : '');

    // 이미지
    const img = document.createElement('img');
    img.src = pokeUrl(name); img.alt = pokeKr(name);

    // 이름
    const nm = document.createElement('div');
    nm.className = 'poke-card-name'; nm.textContent = pokeKr(name);

    // 급수
    const lv = document.createElement('div');
    lv.className = 'poke-card-level'; lv.textContent = level + '급';

    card.appendChild(img); card.appendChild(nm); card.appendChild(lv);

    // 뱃지
    if (isRare2) {
      const b = document.createElement('div');
      b.className = 'poke-badge rare2'; b.textContent = '💎 초레어 25%';
      card.appendChild(b);
    } else if (isRare1) {
      const b = document.createElement('div');
      b.className = 'poke-badge rare1'; b.textContent = '⭐ 레어 50%';
      card.appendChild(b);
    }

    // 이미 수집한 포켓몬 표시
    if (G.collected.includes(name)) {
      const c = document.createElement('div');
      c.className = 'poke-badge collected-badge'; c.textContent = '✅ 수집완료';
      card.appendChild(c);
    }

    card.onclick = () => {
      G.enemyPoke = name;
      G.level = level;
      document.getElementById('level-badge').textContent = level + '급';
      // 한자풀 급수 변경 시 재구성
      let pool = [];
      for (let lv = 8; lv >= G.level; lv--) {
        if (HANJA_DB[lv]) pool = pool.concat(HANJA_DB[lv]);
      }
      const seen = new Set();
      pool = pool.filter(h => { if (seen.has(h.char)) return false; seen.add(h.char); return true; });
      G.pool = shuffle(pool); G.usedIdx = [];

      // 배틀 리셋 (내 포켓몬 유지, 상대만 교체)
      G.monsterHp = 10; G.playerHp = 3;
      G.skillCharge = 0; G.skillReady = false;
      G.combo = 0; G.maxCombo = 0;
      G.correctCount = 0; G.wrongCount = 0;

      document.getElementById('enemy-img').src = pokeUrl(name);
      document.getElementById('enemy-name').textContent = '야생 ' + pokeKr(name);

      updateAllUI();
      loadNextHanja();
      showScreen('battle-screen');
    };

    nextCards.appendChild(card);
  });

  showScreen('catch-screen');
}

// ════════════════════════════════════════════
// 게임 오버
// ════════════════════════════════════════════
function showGameOver() {
  document.getElementById('go-img').src = pokeUrl(G.enemyPoke);
  document.getElementById('go-correct').textContent = G.correctCount;
  document.getElementById('go-wrong').textContent   = G.wrongCount;
  document.getElementById('go-combo').textContent   = G.maxCombo;
  showScreen('gameover-screen');
}

function retryBattle() {
  resetBattleState();
  showScreen('battle-screen');
  loadNextHanja();
  updateAllUI();
}

// ════════════════════════════════════════════
// 폭죽
// ════════════════════════════════════════════
function launchConfetti() {
  const c = document.getElementById('confetti');
  c.innerHTML = '';
  const cols = ['#ffd700','#ff4455','#00e676','#4488ff','#aa44ff','#ff8800','#ffffff'];
  for (let i=0;i<80;i++){
    const el = document.createElement('div');
    el.className = 'cp';
    el.style.cssText = `left:${Math.random()*100}vw;
      background:${cols[Math.floor(Math.random()*cols.length)]};
      width:${Math.random()*10+4}px;height:${Math.random()*10+4}px;
      border-radius:${Math.random()>.5?'50%':'2px'};
      animation-duration:${Math.random()*1.5+1.5}s;
      animation-delay:${Math.random()*.5}s;`;
    c.appendChild(el);
  }
  setTimeout(()=>c.innerHTML='', 3500);
}

// ════════════════════════════════════════════
// 급수 선택
// ════════════════════════════════════════════
document.querySelectorAll('.level-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.level-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    G.level = parseInt(btn.dataset.level);
    renderMainPokemons(); // 급수 바꾸면 포켓몬도 교체
  });
});

// 초기 포켓몬 렌더
renderMainPokemons();
</script>
